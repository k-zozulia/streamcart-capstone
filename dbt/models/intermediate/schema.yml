version: 2

models:
  - name: int_orders_enriched
    description: "Enriched orders with total_amount, fulfillment_days, time dimensions"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: total_amount
        tests:
          - not_null
      - name: order_date
        tests:
          - not_null

  - name: int_orders_quality_flags
    description: "Orders with quality flags and rejection reasons"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: is_valid_quantity
        tests:
          - not_null
      - name: is_valid_price
        tests:
          - not_null
      - name: is_valid_overall
        tests:
          - not_null