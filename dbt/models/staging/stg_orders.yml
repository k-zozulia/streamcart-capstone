version: 2

sources:
  - name: streamcart_raw
    database: STREAMCART_DB
    schema: RAW
    tables:
      - name: orders_curated
        description: "Valid orders loaded from S3 curated zone via COPY INTO"
        config:
          freshness:
            warn_after: {count: 25, period: hour}
            error_after: {count: 49, period: hour}
        loaded_at_field: updated_at
      - name: orders_quarantine
        description: "Rejected orders from Glue job"

models:
  - name: stg_orders
    description: "Staged orders — typed, renamed, no business logic"
    columns:
      - name: order_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: quantity
        tests:
          - not_null
      - name: unit_price
        tests:
          - not_null
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['pending', 'processing', 'shipped', 'delivered', 'cancelled']
      - name: record_type
        tests:
          - accepted_values:
              values: ['INSERT', 'UPDATE']
      - name: _extracted_at
        tests:
          - not_null